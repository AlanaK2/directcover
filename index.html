<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente Direct Cover</title>
    <style>
        :root {
            --primary-dark: #001529;
            --bg-light: #f0f2f5;
            --bubble-bot: #f0f2f5;
            --bubble-user: #e6f7ff;
            --accent-blue: #91c4ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container Principal */
        .chat-card {
            width: 400px;
            height: 550px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background-color: var(--primary-dark);
            color: white;
            padding: 16px 20px;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header p {
            margin: 4px 0 0;
            font-size: 12px;
            opacity: 0.8;
        }

        /* Área de Mensagens */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
        }

        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--primary-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            color: #333;
        }

        .bot .bubble {
            background-color: var(--bubble-bot);
            border-top-left-radius: 2px;
        }

        .user .bubble {
            background-color: var(--bubble-user);
            border-top-right-radius: 2px;
        }

        /* Footer / Input */
        .chat-footer {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #f0f2f5;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            background-color: var(--accent-blue);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .send-btn:hover { opacity: 0.8; }
        .send-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Icone simples em SVG para o avião */
        .send-icon {
            width: 18px;
            height: 18px;
            fill: white;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="chat-header">
        <h2>Assistente Direct Cover</h2>
        <p>Online • Resposta em segundos</p>
    </div>

    <div class="chat-messages" id="chat-box">
        <div class="message-row bot">
            <div class="avatar">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M12 2a2 2 0 0 1 2 2v2h2a2 2 0 0 1 2 2v2h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2h2V8a2 2 0 0 1 2-2h2V4a2 2 0 0 1 2-2zM4 12v6h16v-6H4zm4-4h8v2H8V8zm4-4v2h2V4h-2z"/></svg>
            </div>
            <div class="bubble">
                Olá! Sou o Direct Cover, seu assistente de cobertura odontológica. Qual procedimento você deseja consultar?
            </div>
        </div>
    </div>

    <div class="chat-footer">
        <input type="text" id="user-input" class="chat-input" placeholder="Ex: Extração de siso" autocomplete="off">
        <button id="send-btn" class="send-btn">
            <svg class="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const API_URL = "https://oioioioioio.azurewebsites.net/api/agent";
    const API_KEY = "EXjXoUexPoIgISE1cDLkiGD4M5Za9_CdjY0qivcVDClXAzFuS3WolQ==";

    function appendMessage(text, side) {
        const row = document.createElement('div');
        row.className = `message-row ${side}`;
        
        const content = side === 'bot' ? `
            <div class="avatar">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M12 2a2 2 0 0 1 2 2v2h2a2 2 0 0 1 2 2v2h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2h2V8a2 2 0 0 1 2-2h2V4a2 2 0 0 1 2-2zM4 12v6h16v-6H4zm4-4h8v2H8V8zm4-4v2h2V4h-2z"/></svg>
            </div>
            <div class="bubble">${text}</div>
        ` : `<div class="bubble">${text}</div>`;

        row.innerHTML = content;
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // Limpa input e desabilita botão
        userInput.value = '';
        appendMessage(message, 'user');
        sendBtn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-functions-key': API_KEY
                },
                body: JSON.stringify({ message: message })
            });

            if (!response.ok) throw new Error('Erro na API');

            const data = await response.json();
            // Ajuste aqui conforme a estrutura de retorno da sua API (ex: data.reply ou data.message)
            const botReply = data.message || data.reply || "Desculpe, não entendi.";
            appendMessage(botReply, 'bot');

        } catch (error) {
            appendMessage("Erro ao conectar com o servidor.", 'bot');
            console.error(error);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
